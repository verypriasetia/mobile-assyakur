<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Display Masjid Assyakur</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat', sans-serif; }
        body { background:#010f09; color:#fff; height:100vh; overflow:hidden; padding:1vh; }
        .signage-container-portrait { display:flex; flex-direction:column; height:100%; gap:0.5vh; }
        .main-header-portrait { height:8vh; display:flex; align-items:center; background:#0b301c; border:0.1vh solid #e5c158; border-radius:0.5vh; padding:0 2vw; }
        .papan-body-portrait { flex:1; position:relative; background:#061b10; border:0.2vh solid #e5c158; border-radius:0.5vh; overflow:hidden; }
        .papan-control-panel { display:flex; height:6vh; background:#0b301c; border:0.2vh solid #e5c158; border-radius:0.5vh; }
        .ctrl-btn { flex:1; background:none; border:none; color:#fff; font-size:1.6vh; font-weight:700; cursor:pointer; }
        .slide { position:absolute; width:100%; height:100%; opacity:0; transition:opacity 1s; display:flex; flex-direction:column; }
        .slide.active { opacity:1; z-index:2; }
    </style>
</head>
<body>
    <div class="signage-container-portrait">
        <header class="main-header-portrait">
            <div style="font-weight:800; color:#e5c158;">MASJID ASSYAKUR</div>
        </header>
        <section class="papan-body-portrait">
            <div id="slide-A" class="slide active"></div>
            <div id="slide-B" class="slide"></div>
        </section>
        <div class="papan-control-panel">
            <button class="ctrl-btn" onclick="kembaliSlideManual()">⏮️ Prev</button>
            <button class="ctrl-btn" id="btn-pause-play" onclick="toggleJedaOtomatis()">⏸️ Jeda</button>
            <button class="ctrl-btn" onclick="lanjutSlideManual()">Next ⏭️</button>
        </div>
    </div>
    <script src="jadwal_db.js"></script>
    <script src="combined.js"></script>
</body>
</html>
