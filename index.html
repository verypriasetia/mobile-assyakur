<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Display Masjid Assyakur</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #010f09; color: #ffffff; height: 100vh; width: 100vw; overflow: hidden; padding: 1vh; }
        .signage-container-portrait { display: flex; flex-direction: column; height: 100%; gap: 1vh; }
        
        /* Header */
        .main-header-portrait { display: flex; align-items: center; background: rgba(11, 48, 28, 0.95); border: 0.2vh solid #e5c158; border-radius: 1vh; padding: 0.5vh 2vw; height: 9vh; }
        .logo-img-portrait { height: 6vh; margin-right: 2vw; }
        .title-container-portrait h1 { font-size: 1.8vh; color: #e5c158; font-weight: 800; }
        .address-inline { font-size: 1vh; color: #a2bcae; }

        /* Widget Waktu */
        .time-widget-row { display: flex; gap: 1vw; height: 10vh; }
        .card-portrait { background: rgba(11, 48, 28, 0.9); border: 0.2vh solid rgba(229, 193, 88, 0.4); border-radius: 1vh; display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; }
        .clock-display { font-size: 2.2vh; font-weight: 800; color: #2ecc71; }
        .card-countdown-portrait .time-main { font-size: 2.2vh; font-weight: 800; }

        /* Papan Informasi (Diperbaiki agar seimbang) */
        .main-papan-portrait { flex: 1; display: flex; flex-direction: column; background: rgba(6, 27, 16, 0.85); border: 0.25vh solid #e5c158; border-radius: 1vh; overflow: hidden; }
        .papan-header-portrait { background: #0b301c; color: #e5c158; font-size: 1.8vh; font-weight: 700; text-align: center; padding: 0.5vh 0; }
        .papan-body-portrait { flex: 1; position: relative; overflow: hidden; padding: 0.5vh; }
        
        /* Navigasi */
        .papan-control-panel { display: flex; background: #0b301c; border: 0.25vh solid #e5c158; border-radius: 0.8vh; height: 5vh; }
        .ctrl-btn { flex: 1; background: transparent; border: none; color: #fff; font-size: 1.4vh; font-weight: 700; }
        
        /* Teks & Tabel */
        .info-text-content { font-family: 'Amiri', serif !important; font-size: 2.2vh !important; line-height: 1.4; text-align: center; padding: 1vh; }
        .table-kas { width: 100%; font-size: 1.2vh !important; border-collapse: collapse; }
    </style>
</head>
<body onclick="aktivasiAudio()"> <!-- Pancing audio saat klik pertama -->

    <div class="signage-container-portrait">
        <header class="main-header-portrait">
            <img src="logo.png" alt="Logo" class="logo-img-portrait">
            <div class="title-container-portrait">
                <h1>MASJID ASSYAKUR</h1>
                <div class="address-inline">Perum. Pesona Aqila Regency, Gg. Makassar RT.016, Desa Jone, Paser</div>
            </div>
        </header>

        <section class="time-widget-row">
            <div class="card-portrait"><div class="clock-display" id="clock-time">00:00:00</div></div>
            <div class="card-portrait card-countdown-portrait"><div class="time-main" id="countdown-time">00:00</div></div>
        </section>

        <section class="main-papan-portrait">
            <div class="papan-header-portrait">PAPAN INFORMASI MASJID</div>
            <div class="papan-body-portrait">
                <div id="papan-slide-container" class="slide-container">
                    <div id="slide-A" class="slide active"></div>
                    <div id="slide-B" class="slide"></div>
                </div>
            </div>
        </section>

        <div class="papan-control-panel">
            <button class="ctrl-btn" onclick="kembaliSlideManual()">⏮️ Prev</button>
            <button class="ctrl-btn" id="btn-pause-play" onclick="toggleJedaOtomatis()">⏸️ Jeda</button>
            <button class="ctrl-btn" onclick="lanjutSlideManual()">Next ⏭️</button>
        </div>
    </div>

    <script src="jadwal_db.js"></script>
    <script src="combined.js"></script>
    <script>
        function aktivasiAudio() {
            const audio = new Audio('BEEP_PENDEK.mp3');
            audio.volume = 0;
            audio.play().then(() => console.log("Audio siap")).catch(() => {});
        }
    </script>
</body>
</html>
